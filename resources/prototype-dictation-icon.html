<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VentoType - Premium Studio Polish</title>
  <style>
    /* =========================================
       1. Studio Background
       ========================================= */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 56px;
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #f8fafc;
      background-image: 
        radial-gradient(circle at center, transparent 0%, #ffffff 120%),
        linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9), 
        linear-gradient(45deg, #f1f5f9 25%, transparent 25%, transparent 75%, #f1f5f9 75%, #f1f5f9);
      background-size: 100% 100%, 32px 32px, 32px 32px;
      background-position: center, 0 0, 16px 16px;
    }

    .demo-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .label {
      font-size: 12px;
      color: #64748b;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* =========================================
       2. Tactile Glass Overlay
       ========================================= */
    .vento-overlay {
      position: relative;
      width: 48px;
      height: 48px;
      border-radius: 16px; 
      background: linear-gradient(135deg, rgba(30, 30, 35, 0.45) 0%, rgba(15, 15, 20, 0.55) 100%);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 20px 40px -8px rgba(0, 0, 0, 0.3),
        0 4px 12px rgba(0, 0, 0, 0.1),
        inset 0 1px 1px rgba(255, 255, 255, 0.2),
        inset 0 -1px 1px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
    }

    .vento-overlay::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
      opacity: 0.12;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .vento-overlay:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 
        0 24px 48px -8px rgba(0, 0, 0, 0.25),
        0 8px 16px rgba(0, 0, 0, 0.1),
        inset 0 1px 1px rgba(255, 255, 255, 0.3),
        inset 0 -1px 1px rgba(0, 0, 0, 0.4);
    }

    /* =========================================
       3. Neon Bloom SVG Styling
       ========================================= */
    .vento-icon {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: #4ade80; 
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      position: relative;
      z-index: 2; 
      filter: drop-shadow(0 0 4px rgba(74, 222, 128, 0.6)) drop-shadow(0 2px 2px rgba(0,0,0,0.4));
    }

    /* --- 1. Recording --- */
    .vento-recording .core {
      transform-origin: center;
      animation: vento-breath 2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .vento-recording .ring {
      transform-origin: center;
      animation: vento-ripple 2s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
    }
    .vento-recording .ring-2 {
      animation-delay: 0.2s;
    }
    @keyframes vento-breath {
      0%, 100% { transform: scale(0.85); }
      50% { transform: scale(1.15); filter: brightness(1.2); }
    }
    @keyframes vento-ripple {
      0% { transform: scale(0.4); opacity: 0.8; stroke-width: 2px; }
      100% { transform: scale(1.1); opacity: 0; stroke-width: 0.5px; }
    }

    /* --- 2. Transcribing --- */
    .vento-icon.vento-transcribing {
      animation: vento-spin 1.8s cubic-bezier(0.4, 0.1, 0.6, 0.9) infinite;
      /* 40% softer shadow: increased blur, decreased opacity */
      filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.35)) drop-shadow(0 2px 3px rgba(0,0,0,0.25));
    }
    .vento-transcribing .arc-1 {
      stroke: rgba(74, 222, 128, 0.25); 
      filter: none;
    }
    @keyframes vento-spin {
      100% { transform: rotate(360deg); }
    }

    /* --- 3. Typing --- */
    .vento-typing .stream {
      stroke-dasharray: 8 16; 
      animation: vento-flow linear infinite;
    }
    .vento-typing .stream-1 { animation-duration: 1.2s; opacity: 0.8;}
    .vento-typing .stream-2 { animation-duration: 1.5s; opacity: 1; }
    .vento-typing .stream-3 { animation-duration: 0.9s; opacity: 0.6;}
    @keyframes vento-flow {
      0% { stroke-dashoffset: 24; }
      100% { stroke-dashoffset: 0; }
    }

    /* --- 4. Error (Static & Clear) --- */
    .vento-icon.vento-error {
      stroke: #f87171; /* Elegant, soft red */
      filter: drop-shadow(0 0 4px rgba(248, 113, 113, 0.5)) drop-shadow(0 2px 2px rgba(0,0,0,0.3));
    }
  </style>
</head>
<body>

  <div class="demo-wrapper">
    <div class="vento-overlay">
      <svg xmlns="http://www.w3.org/2000/svg" class="vento-icon vento-recording" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" class="core" fill="#4ade80" stroke="none" />
        <circle cx="12" cy="12" r="7" class="ring ring-1" />
        <circle cx="12" cy="12" r="11" class="ring ring-2" />
      </svg>
    </div>
    <div class="label">Recording</div>
  </div>

  <div class="demo-wrapper">
    <div class="vento-overlay">
      <svg xmlns="http://www.w3.org/2000/svg" class="vento-icon vento-transcribing" viewBox="0 0 24 24">
        <path d="M12 4 A 8 8 0 0 1 20 12" class="arc arc-1" />
        <path d="M12 20 A 8 8 0 0 1 4 12" class="arc arc-2" />
      </svg>
    </div>
    <div class="label">Transcribing</div>
  </div>

  <div class="demo-wrapper">
    <div class="vento-overlay">
      <svg xmlns="http://www.w3.org/2000/svg" class="vento-icon vento-typing" viewBox="0 0 24 24">
        <line x1="3" y1="8" x2="21" y2="8" class="stream stream-1" />
        <line x1="3" y1="12" x2="18" y2="12" class="stream stream-2" />
        <line x1="3" y1="16" x2="20" y2="16" class="stream stream-3" />
      </svg>
    </div>
    <div class="label">Typing</div>
  </div>

  <div class="demo-wrapper">
    <div class="vento-overlay">
      <svg xmlns="http://www.w3.org/2000/svg" class="vento-icon vento-error" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="7" x2="12" y2="13" class="error-line" />
        <circle cx="12" cy="16.5" r="1.25" class="error-dot" fill="#f87171" stroke="none" />
      </svg>
    </div>
    <div class="label">Error</div>
  </div>

</body>
</html>
