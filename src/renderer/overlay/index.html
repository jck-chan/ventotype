<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VentoType Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="badge" class="badge">
      <!-- Recording: breathing core + two ripple rings -->
      <svg id="icon-record" class="icon" viewBox="0 0 24 24" overflow="visible">
        <circle cx="12" cy="12" r="3" class="core" fill="#d4a574" stroke="none" />
        <circle cx="12" cy="12" r="7" class="ring ring-1" />
        <circle cx="12" cy="12" r="11" class="ring ring-2" />
      </svg>

      <!-- Transcribing: spinning arc pair -->
      <svg id="icon-loading" class="icon hidden" viewBox="0 0 24 24" overflow="visible">
        <path d="M12 4 A 8 8 0 0 1 20 12" class="arc arc-1" />
        <path d="M12 20 A 8 8 0 0 1 4 12" class="arc arc-2" />
      </svg>

      <!-- Typing: three flowing lines -->
      <svg id="icon-typing" class="icon hidden" viewBox="0 0 24 24" overflow="visible">
        <line x1="3" y1="8"  x2="21" y2="8"  class="stream stream-1" />
        <line x1="3" y1="12" x2="18" y2="12" class="stream stream-2" />
        <line x1="3" y1="16" x2="20" y2="16" class="stream stream-3" />
      </svg>

      <!-- Error: circle with exclamation -->
      <svg id="icon-error" class="icon hidden" viewBox="0 0 24 24" overflow="visible">
        <circle cx="12" cy="12" r="10" />
        <line x1="12" y1="7" x2="12" y2="13" />
        <circle cx="12" cy="16.5" r="1.25" fill="#f87171" stroke="none" />
      </svg>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
