<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VentoType Overlay</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="badge" class="badge">
      <!-- Icon is swapped via JS based on state -->
      <svg id="icon-record" class="icon" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="7" fill="currentColor" opacity="0.15"/>
        <circle cx="12" cy="12" r="4" fill="#ef4444"/>
      </svg>
      <svg id="icon-loading" class="icon hidden" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2" stroke-opacity="0.2"/>
        <path d="M12 3 a9 9 0 0 1 9 9" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <svg id="icon-typing" class="icon hidden" viewBox="0 0 24 24" fill="none">
        <rect x="3" y="7" width="18" height="10" rx="2" stroke="#34d399" stroke-width="1.5"/>
        <path d="M7 12h2M11 12h2M15 12h2" stroke="#34d399" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <svg id="icon-error" class="icon hidden" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="#f87171" stroke-width="1.5"/>
        <path d="M12 8v4M12 16h.01" stroke="#f87171" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
